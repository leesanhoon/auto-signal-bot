name: Lottery Predictor

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Miền cần dự đoán (chọn 'all' để chạy cả 3 miền)"
        required: true
        type: choice
        options:
          - all
          - mien-bac
          - mien-trung
          - mien-nam
        default: all
  # schedule:
  #   # Miền Nam 16:45 VN = UTC 09:45
  #   - cron: "45 9 * * *"
  #   # Miền Trung 17:45 VN = UTC 10:45
  #   - cron: "45 10 * * *"
  #   # Miền Bắc 18:45 VN = UTC 11:45
  #   - cron: "45 11 * * *"

jobs:
  lottery-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine region from cron schedule
        id: region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.region }}" = "all" ]; then
              echo "value=" >> "$GITHUB_OUTPUT"
            else
              echo "value=${{ inputs.region }}" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event.schedule }}" = "45 9 * * *" ]; then
            echo "value=mien-nam" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 10 * * *" ]; then
            echo "value=mien-trung" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 11 * * *" ]; then
            echo "value=mien-bac" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lottery predictor
        env:
          LOTTERY_PREDICT_REGION: ${{ steps.region.outputs.value }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run lottery-predict
