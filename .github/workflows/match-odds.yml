name: Match Odds Scanner

on:
  workflow_dispatch:
  schedule:
    # 12:00 VN hằng ngày = UTC 05:00
    - cron: "0 5 * * *"

jobs:
  match-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run match odds scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.AI_TEXT_MODEL }}
          AI_TEXT_FALLBACK_MODEL: ${{ vars.AI_TEXT_FALLBACK_MODEL }}
          BETTING_AI_ANALYZE_TIMEOUT_MS: ${{ vars.BETTING_AI_ANALYZE_TIMEOUT_MS }}
          BETTING_AI_COMBINED_TIMEOUT_MS: ${{ vars.BETTING_AI_COMBINED_TIMEOUT_MS }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_BOOKMAKER: ${{ vars.API_FOOTBALL_BOOKMAKER }}
          API_FOOTBALL_LEAGUE: ${{ vars.API_FOOTBALL_LEAGUE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run match-odds
