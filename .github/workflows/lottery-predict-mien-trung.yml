name: Lottery Predictor — Miền Trung

on:
  schedule:
    - cron: "45 10 * * *"
  workflow_dispatch:

jobs:
  lottery-predict-mien-trung:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lottery predictor — Miền Trung
        env:
          LOTTERY_PREDICT_REGION: mien-trung
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.AI_TEXT_MODEL }}
          AI_TEXT_FALLBACK_MODEL: ${{ vars.AI_TEXT_FALLBACK_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run lottery-predict:mien-trung
