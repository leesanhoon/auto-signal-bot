name: TradingView Chart Analysis

on:
  workflow_dispatch:
  # schedule:
  #   # T2-T6 07:05, 11:05, 15:05, 19:05, 23:05 VN = UTC 00:05, 04:05, 08:05, 12:05, 16:05
  #   - cron: "5 0,4,8,12,16 * * 1-5"
  #   # T3-T7 03:05 VN = UTC 20:05 (hôm trước)
  #   - cron: "5 20 * * 2-6"

concurrency:
  group: analyze-volman
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          CHART_SIGNAL_CONFIDENCE_THRESHOLD: ${{ vars.CHART_SIGNAL_CONFIDENCE_THRESHOLD }}
          PENDING_ORDER_EXPIRY_RUNS: ${{ vars.PENDING_ORDER_EXPIRY_RUNS }}
          CHART_ENGINE_MODE: ${{ vars.CHART_ENGINE_MODE }}
          CHART_TIMEFRAME_MODE: ${{ vars.CHART_TIMEFRAME_MODE }}
          CHART_PRIMARY_TIMEFRAME: ${{ vars.CHART_PRIMARY_TIMEFRAME }}
        run: npm run analyze
